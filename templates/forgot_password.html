{% extends "base.html" %}
{% block title %}Forgot Password — MoviWebApp{% endblock %}
{% block content %}
<div class="auth-page">
    <h1>Forgot Password</h1>
    <p class="text-muted">Enter the email address associated with your account and we'll send you a reset link.</p>
    <form action="{{ url_for('auth.forgot_password') }}" method="post">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" autofocus>
        <button type="submit" class="btn btn-primary">Send reset link</button>
    </form>
    <p class="mt-1"><a href="{{ url_for('auth.login') }}">&larr; Back to login</a></p>
</div>
{% endblock %}
