{% extends "base.html" %}
{% block title %}Settings · MoviWebApp{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="section-title">Settings</h2>
</div>

<div class="settings-card mt-2">
    <form action="{{ url_for('settings') }}" method="post" class="settings-form">
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email"
                   value="{{ current_user.email or '' }}"
                   placeholder="you@example.com" maxlength="120">
            <small class="form-hint">Used for notifications only. Never shared.</small>
        </div>
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="email_notifications"
                       {% if current_user.email_notifications %}checked{% endif %}>
                Email me when someone follows me or likes my review
            </label>
        </div>
        <button type="submit" class="btn">Save settings</button>
    </form>
</div>
{% endblock %}
