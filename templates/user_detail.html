{% extends "base.html" %}

{% block content %}
  <h2>{{ user.username }}'s movies</h2>

  <form action="{{ url_for('add_movie', user_id=user.id) }}" method="post" class="mt-2">
    <label for="title">Add a movie</label>
    <input type="text" id="title" name="title" placeholder="Movie title" required maxlength="120">
    <input type="submit" value="Add movie">
  </form>

  {% if favorites %}
    <ul class="card-list mt-2">
      {% for movie in favorites %}
        <li class="card">
          <div class="card-title">{{ movie.title }}</div>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="mt-2">No movies yet. Add one above!</p>
  {% endif %}
{% endblock %}
