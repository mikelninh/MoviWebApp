{% extends "base.html" %}
{% block title %}{{ code }} · MoviWebApp{% endblock %}

{% block content %}
<div class="error-page">

    <div class="error-film-strip">
        {% for i in range(8) %}<div class="film-hole"></div>{% endfor %}
    </div>

    <div class="error-body">
        <div class="error-code">{{ code }}</div>
        <h1 class="error-title">{{ title }}</h1>
        <p class="error-message">{{ message }}</p>

        <blockquote class="error-quote">
            <p>{{ quote }}</p>
            <cite>{{ quote_attr }}</cite>
        </blockquote>

        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn">Back to the lobby</a>
            <a href="javascript:history.back()" class="btn btn-ghost">Go back</a>
        </div>
    </div>

    <div class="error-film-strip error-film-strip-bottom">
        {% for i in range(8) %}<div class="film-hole"></div>{% endfor %}
    </div>

</div>
{% endblock %}
